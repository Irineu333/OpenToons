name: Poc07Reader
options:
  bundleIdPrefix: org.opentoons.poc07
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    DEVELOPMENT_TEAM: "7BMPL2Z939"
    CODE_SIGN_STYLE: Automatic
    FRAMEWORK_SEARCH_PATHS:
      - "$(SRCROOT)/../trama/build/bin/iosArm64/debugFramework"
targets:
  Poc07Reader:
    type: application
    platform: iOS
    sources:
      - Sources
      # certificados de reseed I2P embarcados (folder reference → copiado como pasta no bundle);
      # o app copia p/ o datadir gravável antes de subir o router i2pd embarcado.
      - path: Resources/certificates
        type: folder
      # snapshot do netDb (routerInfos conhecidos-bons) p/ o router embarcado ter peers
      # conectáveis de saída — no iOS, atrás de NAT, o reseed sozinho dá poucos peers úteis.
      - path: Resources/netDb
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.opentoons.poc07.reader
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # libs estáticas iOS que o libi2pd embarcado (célula 3) exige, resolvidas no link do app
        # (o .a do wrapper+libi2pd já está dentro do framework via cinterop; OpenSSL/Boost não).
        LIBRARY_SEARCH_PATHS:
          - "$(SRCROOT)/../i2p-facade/deps"
        OTHER_LDFLAGS:
          - "-framework"
          - "CryptoKit"
          - "-framework"
          - "Security"
          - "-framework"
          - "Foundation"
          # rust-libp2p (quinn/if-watch) detecta interfaces de rede via SystemConfiguration
          - "-framework"
          - "SystemConfiguration"
          # libi2pd embarcado (célula 3): OpenSSL + Boost + zlib + runtime C++ + resolver
          - "-lssl"
          - "-lcrypto"
          - "-lboost_filesystem"
          - "-lboost_program_options"
          - "-lboost_atomic"
          - "-lz"
          - "-lc++"
          - "-lresolv"
    dependencies:
      - framework: ../trama/build/bin/iosArm64/debugFramework/OpenToonsKit.framework
        embed: false
